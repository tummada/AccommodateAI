server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    # Hide nginx version in error pages and Server response header.
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # ─────────────────────────────────────────────────────────────────────
    # Security headers (defense-in-depth — the upstream Caddy / Cloudflare
    # may also set these, but we ship them at the origin so the bundle is
    # safe in any direct-to-nginx deployment).
    #
    # CSP scope (T-069 / Auditor SEC-001):
    #  - default-src 'self'        — no third-party origins by default
    #  - script-src 'self'         — only Vite-bundled JS allowed
    #  - style-src 'self' 'unsafe-inline'
    #                              — Tailwind compiles styles into hashed
    #                                .css files; 'unsafe-inline' is needed
    #                                because react-router and other libs
    #                                set inline style="..." attrs on
    #                                rendered nodes (tested against
    #                                dist/index.html — no <style> blocks
    #                                are emitted, but inline style props
    #                                are common React patterns).
    #  - font-src 'self' data:     — fonts are now self-hosted via the
    #                                tailwind system-font stack; data: is
    #                                kept for any embedded woff base64.
    #  - img-src 'self' data:      — same-origin + data URIs only
    #  - connect-src 'self' https://accommodate-api.vollos.ai
    #                              — only XHR/fetch to acmd-api allowed
    #  - frame-ancestors 'none'    — clickjacking shield (X-Frame-Options
    #                                kept too for legacy clients)
    #  - base-uri 'self'           — pin <base href>
    #  - form-action 'self'        — pin <form action>
    # ─────────────────────────────────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' https://accommodate-api.vollos.ai; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Long-cache hashed Vite assets (filenames include a content hash).
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Re-emit security headers — `add_header` does NOT inherit when a
        # nested location declares its own add_header. Without this block
        # /assets/* responses would have ZERO security headers (nginx quirk).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' https://accommodate-api.vollos.ai; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        try_files $uri =404;
    }

    # index.html must NOT be cached so a new bundle deploys take effect
    # immediately (hashed assets in /assets/ are content-addressed).
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        # Re-emit security headers for the same reason as /assets/.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data:; connect-src 'self' https://accommodate-api.vollos.ai; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        try_files $uri =404;
    }

    # SPA fallback — react-router handles /privacy, /terms, and the catch-all
    # 404 page on the client. Static assets (hashed JS/CSS under /assets/)
    # are served directly above; any other path falls back to index.html so
    # a deep link (e.g. /privacy) survives a browser refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
