server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router handles client-side routing.
    # Static files served directly; unknown paths fall back to index.html
    # so deep-linked routes (e.g. /login, /case/123) don't 404 on refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
