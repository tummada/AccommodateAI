# =============================================================================
# scripts/secrets-config.example.yaml
# -----------------------------------------------------------------------------
# Template for sync-secrets.sh. Copy to scripts/secrets-config.yaml (which is
# gitignored) and edit the targets/keys lists for your environment.
#
# Usage:
#   cp scripts/secrets-config.example.yaml scripts/secrets-config.yaml
#   ./scripts/sync-secrets.sh --config scripts/secrets-config.yaml --dry-run
#   ./scripts/sync-secrets.sh --config scripts/secrets-config.yaml --apply
# =============================================================================

# Source-of-truth GitLab project (the script reads variable values FROM here).
# This must be the canonical project where secrets are rotated/managed.
source:
  project: tummadajingjing/vollos-core

# Target product repos that must mirror the source values. Add a new entry
# when launching a new product (bnfg, hazship, etc.). The PAT loaded from
# .env (VOLLOS_CLI_v2) needs `api` scope on every target listed below.
targets:
  - tummadajingjing/vollos-acmd
  # - tummadajingjing/vollos-bnfg          # uncomment when bnfg repo exists
  # - tummadajingjing/vollos-hazship       # uncomment when hazship repo exists

# Variables to sync. Each key MUST exist on the source; the script exits 3
# with a list of missing keys otherwise. Add only the secrets that products
# actually consume — do not blanket-copy every variable from vollos-core.
keys:
  - GOOGLE_CLIENT_ID
  - GOOGLE_CLIENT_SECRET
  - GOOGLE_REFRESH_TOKEN
  - GMAIL_USER
  # add more as products need them

# Default flags applied when CREATING new variables at a target. If a variable
# already exists at the target with different flags, the script keeps your
# existing flags and only updates the value (sha256-driven).
default_flags:
  masked: true
  protected: true
  variable_type: env_var
